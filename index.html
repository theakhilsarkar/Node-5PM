<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTML5 Practice</title>

    ```
    <!-- Favicon -->
    <link rel="icon" href="favicon.png" />

    <style>
      body {
        font-family: Arial;
        margin: 0;
      }
      header,
      nav,
      main,
      section,
      footer {
        padding: 15px;
        margin: 10px;
        border: 1px solid #ccc;
      }
      nav a {
        margin: 10px;
        text-decoration: none;
      }
    </style>
    ```
  </head>

  <body>
    ```
    <!-- Header -->
    <header>
      <h1>My HTML5 Website</h1>
      <p>Welcome to HTML5 Practice</p>
    </header>

    <!-- Navigation -->
    <nav>
      <a href="#">Home</a>
      <a href="#">Videos</a>
      <a href="#">Audio</a>
    </nav>

    <!-- Main Content -->
    <main>
      <!-- Section -->
      <section>
        <h2>Audio Example</h2>
        <audio controls loop>
          <source src="audio.mp3" type="audio/mp3" />
          Your browser does not support audio.
        </audio>
      </section>

      <section>
        <h2>Video Example</h2>
        <video width="400" controls autoplay muted>
          <source src="video.mp4" type="video/mp4" />
          Your browser does not support video.
        </video>
      </section>

      <section>
        <h2>Iframe Example (YouTube)</h2>
        <iframe
          width="400"
          height="250"
          src="https://www.youtube.com/embed/tgbNymZ7vqY"
        >
        </iframe>
      </section>

      <!-- Div Example -->
      <div>
        <h3>About Us</h3>
        <p>This is a simple HTML5 page using all important tags.</p>
      </div>
    </main>

    <!-- Footer -->
    <footer>
      <p>© 2026 My Website</p>
    </footer>
    ```
  </body>
</html>
